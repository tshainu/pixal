name = "pixal"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "pandora_db"
database_name = "pandora-db"
database_id = "5aad9c90-e8fe-445c-a198-ca93059612ea"

[triggers]
crons = ["0 1 * * *"]
